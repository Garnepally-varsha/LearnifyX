<!DOCTYPE html>
<html>
<head>
    <title>LearnifyX - Step 1</title>

    <!-- Flask CSS Linking -->
    <link rel="stylesheet" href="{{ url_for('static', filename='question1.css') }}">
</head>
<body>

<a href="/signup" class="back-button">←</a>

<div class="logo">
    📘 <span>LearnifyX</span>
</div>

<div class="progress">
    <div class="step active">1</div>
    <div class="line"></div>
    <div class="step">2</div>
    <div class="line"></div>
    <div class="step">3</div>
</div>

<div class="card">

    <h2>Step 1: What’s Your Learning Goal?</h2>
    <p class="subtitle">
        Select the option that best describes your purpose.
    </p>

    <form action="/question1" method="POST">

        <label class="option">
            <input type="radio" name="goal" value="Fundamentals" required>
            <div>
                <strong>Learn Fundamentals</strong>
                <p>Build strong theoretical foundations from scratch</p>
            </div>
        </label>

        <label class="option">
            <input type="radio" name="goal" value="HandsOn">
            <div>
                <strong>Hands-on Practice</strong>
                <p>Work with coding exercises and practical labs</p>
            </div>
        </label>

        <label class="option">
            <input type="radio" name="goal" value="Projects">
            <div>
                <strong>Build Projects</strong>
                <p>Create real-world portfolio projects step by step</p>
            </div>
        </label>

        <label class="option">
            <input type="radio" name="goal" value="Interview">
            <div>
                <strong>Interview Preparation</strong>
                <p>Prepare for technical interviews and assessments</p>
            </div>
        </label>

        <button type="submit" class="next-btn">Next →</button>

    </form>

</div>

</body>
</html>
