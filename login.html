<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LearnifyX - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- Back Arrow Button -->
    <a href="index.html" class="back-button">←</a>

    <!-- Logo -->
    <div class="logo">
        📘 <span>LearnifyX</span>
    </div>

    <!-- Login Card -->
    <div class="login-card">

        <h2><span class="icon">↪</span> Welcome Back</h2>

        <label>Email</label>
        <input type="email" placeholder="you@example.com">

        <label>Password</label>
        <input type="password" placeholder="••••••••">

        <button class="login-btn">Login</button>

        <p class="signup-text">
            Don't have an account? 
            <a href="#">Sign up</a>
        </p>

    </div>

</body>
</html>
